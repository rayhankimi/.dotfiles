# ================================================================
# ~/.tmux.conf
# Last updated: 2025
# ================================================================

# ================================================================
# ENVIRONMENT
# ================================================================
set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin"
setenv -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'

# ================================================================
# GENERAL
# ================================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g default-shell /bin/zsh
set -g default-command /bin/zsh
set -g history-limit 50000
set -g mouse on
set -sg escape-time 0               # no delay (penting untuk Neovim)
set -g focus-events on              # autoread file changes (penting untuk Neovim)
set -g set-clipboard on             # fix double paste

# ================================================================
# WINDOW & PANE
# ================================================================
set -g base-index 1                 # mulai dari 1, bukan 0
setw -g pane-base-index 1
set -g renumber-windows on          # auto renumber kalau window ditutup

# ================================================================
# KEYBINDINGS — SPLIT
# ================================================================
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ================================================================
# KEYBINDINGS — NAVIGATION (tanpa prefix)
# ================================================================
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R
bind -n M-p previous-window
bind -n M-n next-window

# ================================================================
# KEYBINDINGS — RESIZE (dengan prefix, repeatable)
# ================================================================
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ================================================================
# COPY MODE — vi keybindings
# ================================================================
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v     send -X begin-selection
bind -T copy-mode-vi y     send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi /     command-prompt -p "search:" "send -X search-forward '%%%'"
bind -T copy-mode-vi Escape send -X cancel

# ================================================================
# MISC
# ================================================================
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# ================================================================
# PLUGINS (TPM)
# ================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

# ================================================================
# PLUGIN CONFIG
# ================================================================
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# ================================================================
# RUN (harus paling bawah)
# ================================================================
run '~/.tmux/plugins/tmux-resurrect/resurrect.tmux'
run '~/.tmux/plugins/tpm/tpm'
